version: 2

models:
  - name: stg_sharecity200_tracker_run01
    description: Normalized run-01 ShareCity tracker metadata from ShareCity200Tracker.xlsx.
    columns:
      - name: city
        description: City name
        tests:
          - not_null
          - unique
      - name: country
        description: Country name
        tests:
          - not_null
      - name: region
        description: Region name
      - name: sharecity_tier
        description: ShareCity scope label (e.g., SC100, SC200)
      - name: priority
        description: Numeric priority for run-01 work planning
      - name: valid_fsi
        description: Count of valid FSI records
      - name: accuracy_rate_pct
        description: Accuracy percentage as numeric value (0-100)
      - name: name_accuracy_rate_pct
        description: Name accuracy percentage as numeric value (0-100)
      - name: source_file_name
        description: Source filename loaded into raw table
      - name: expected_source_file_name
        description: Expected canonical tracker filename
      - name: loaded_at
        description: Ingestion timestamp from raw source

  - name: stg_automation
    description: Cleaned automation URLs with normalized fields
    columns:
      - name: automation_id
        description: Unique identifier for automation records
        tests:
          - unique
          - not_null
      - name: city
        description: City name
        tests:
          - not_null
      - name: source_url
        description: Original source URL
        tests:
          - not_null

  - name: stg_automation_enhanced
    description: Automation URLs with normalized URLs and domain extraction
    columns:
      - name: automation_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: normalized_url
        description: Normalized URL (lowercase, no www/https)
        tests:
          - not_null
      - name: domain
        description: Extracted domain
        tests:
          - not_null

  - name: stg_automation_review
    description: Manual review decisions for automation results
    columns:
      - name: automation_id
        description: Links to stg_automation
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_automation')
                field: automation_id
      - name: is_included
        description: Whether URL is a valid FSI (BOOLEAN)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: stg_ground_truth
    description: Cleaned ground truth URLs
    columns:
      - name: ground_truth_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: city
        description: City name
        tests:
          - not_null
      - name: source_url
        description: Ground truth URL
        tests:
          - not_null

  - name: stg_ground_truth_enhanced
    description: Ground truth with normalized URLs
    columns:
      - name: ground_truth_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: normalized_url
        description: Normalized URL
        tests:
          - not_null

  - name: stg_city_language
    description: Language mapping for each city
    columns:
      - name: city
        description: City name (should be unique per city)
        tests:
          - unique
          - not_null
      - name: search_language
        description: Primary search language
        tests:
          - not_null

