version: 2

models:
  - name: stg_bronze_blob_inventory
    description: |
      Compiled Bronze blob inventory with run-folder mapping (run-01/run-02/run-03/run-04).
      Source table: bronze_blob_inventory_raw (stage LIST snapshot).
    columns:
      - name: file_path
        description: Full blob path
        tests:
          - unique
          - not_null
      - name: run_folder
        description: Extracted run folder path segment (run-01, run-02, ...)
      - name: run_number
        description: Numeric run number extracted from run_folder
      - name: run_label
        description: Neutral run label mapped from run folder
        tests:
          - accepted_values:
              values: ['run_01', 'run_02', 'run_03', 'run_04', 'run_unknown']
      - name: artifact_type
        description: Classified artifact type by folder and filename pattern
        tests:
          - accepted_values:
              values: ['system_file', 'run01_tracker_xlsx', 'run01_tracker_csv', 'scrape_summary', 'scraped_text', 'scrape_metadata_json', 'run_result_xlsx', 'run_result_json', 'versioned_city_xlsx', 'other']

  - name: stg_sharecity200_tracker_run01
    description: Normalized run-01 ShareCity tracker metadata from ShareCity200Tracker.xlsx.
    columns:
      - name: city
        description: City name
        tests:
          - not_null
          - unique
      - name: country
        description: Country name
        tests:
          - not_null
      - name: region
        description: Region name
      - name: sharecity_tier
        description: ShareCity scope label (e.g., SC100, SC200)
      - name: priority
        description: Numeric priority for run-01 work planning
      - name: valid_fsi
        description: Count of valid FSI records
      - name: accuracy_rate_pct
        description: Accuracy percentage as numeric value (0-100)
      - name: name_accuracy_rate_pct
        description: Name accuracy percentage as numeric value (0-100)
      - name: source_file_name
        description: Source filename loaded into raw table
      - name: expected_source_file_name
        description: Expected canonical tracker filename
      - name: loaded_at
        description: Ingestion timestamp from raw source

  - name: stg_run01_tracker_inventory_link
    description: |
      Run-01 tracker to run-01 bronze inventory linkage via normalized city key.
      Metrics are recomputed from pipeline data:
      bronze_total_identified_fsi from Bronze run-01 (automation),
      silver_valid_fsi from Silver run-01,
      precision_rate_pct = silver_valid_fsi / bronze_total_identified_fsi * 100.
    columns:
      - name: tracker_city
        description: City name from run-01 tracker
        tests:
          - not_null
          - unique
      - name: automation_tool_version
        description: Version from tracker CSV (e.g. V1.6, V1.10.1)
      - name: bronze_total_identified_fsi
        description: Total identified FSI in Bronze run-01 for the city+version
      - name: silver_valid_fsi
        description: Valid FSI count in Silver run-01 for the city+version
      - name: precision_rate_pct
        description: Precision percentage computed as silver_valid_fsi / bronze_total_identified_fsi * 100
      - name: run01_file_count
        description: Number of matched run-01 files for this tracker city
      - name: has_run01_inventory_match
        description: TRUE if at least one run-01 inventory file matched this city
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

  - name: stg_automation
    description: Cleaned automation URLs with normalized fields
    columns:
      - name: automation_id
        description: Unique identifier for automation records
        tests:
          - unique
          - not_null
      - name: city
        description: City name
        tests:
          - not_null
      - name: source_url
        description: Original source URL
        tests:
          - not_null

  - name: stg_automation_enhanced
    description: Automation URLs with normalized URLs and domain extraction
    columns:
      - name: automation_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: normalized_url
        description: Normalized URL (lowercase, no www/https)
        tests:
          - not_null
      - name: domain
        description: Extracted domain
        tests:
          - not_null

  - name: stg_automation_review
    description: Manual review decisions for automation results
    columns:
      - name: automation_id
        description: Links to stg_automation
        tests:
          - not_null
          - relationships:
              to: ref('stg_automation')
              field: automation_id
      - name: is_included
        description: Whether URL is a valid FSI (BOOLEAN)
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

  - name: stg_ground_truth
    description: Cleaned ground truth URLs
    columns:
      - name: ground_truth_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: city
        description: City name
        tests:
          - not_null
      - name: source_url
        description: Ground truth URL
        tests:
          - not_null

  - name: stg_ground_truth_enhanced
    description: Ground truth with normalized URLs
    columns:
      - name: ground_truth_id
        description: Unique identifier
        tests:
          - unique
          - not_null
      - name: normalized_url
        description: Normalized URL
        tests:
          - not_null

  - name: stg_city_language
    description: Language mapping for each city
    columns:
      - name: city
        description: City name (should be unique per city)
        tests:
          - unique
          - not_null
      - name: search_language
        description: Primary search language
        tests:
          - not_null

  - name: stg_manual_verification
    description: Manual verification results from 105 cities, 5 rounds
    columns:
      - name: city
        description: City name
        tests:
          - not_null
      - name: url
        description: Full URL
        tests:
          - not_null
      - name: is_valid
        description: Whether URL is a valid FSI
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: round_version
        description: Automation round version
        tests:
          - not_null
          - accepted_values:
              values: ['v1.0.0', 'v1.1.0', 'v1.2.0', 'v1.3.0', 'v2.0.0']
      - name: fp_category
        description: False positive categorization
        tests:
          - accepted_values:
              values: ['VALID', 'FP_MEDIA', 'FP_COMMERCIAL', 'FP_CROWDFUNDING', 'FP_MUSEUM', 'FP_OTHER']
              quote: true

  - name: stg_fsi_powerbi_export
    description: |
      Silver layer: parses date_checked from raw STRING to DATE.
      Adds date_parse_failed flag for QA on unparseable dates.
      Adds is_recent flag to identify records added/checked today.
      Source: silver_fsi_201225 (snapshot/raw)
    columns:
      - name: id
        description: Unique FSI identifier
        tests:
          - unique
          - not_null
      - name: date_checked
        description: Parsed DATE (NULL if raw value was empty or unparseable)
      - name: date_parse_failed
        description: TRUE if raw date_checked had a value but parsing failed
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_recent
        description: TRUE if date_checked = today (newly added or re-checked record)
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
