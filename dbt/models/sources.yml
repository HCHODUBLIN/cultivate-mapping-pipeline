version: 2

sources:
  - name: cultivate
    description: Raw tables for CULTIVATE mapping pipeline data
    database: CULTIVATE
    schema: HC_LOAD_DATA_FROM_CLOUD

    tables:
      - name: raw_ground_truth
        description: Ground truth URLs manually collected
        columns:
          - name: ground_truth_id
            description: Unique identifier for ground truth records
            tests:
              - unique
              - not_null
          - name: city
            description: City name
            tests:
              - not_null
          - name: source_url
            description: Original source URL
            tests:
              - not_null
          - name: file_name
            description: Source file name
          - name: loaded_at
            description: Timestamp when data was loaded
            tests:
              - not_null

      - name: raw_automation
        description: URLs found by automation scripts
        columns:
          - name: automation_id
            description: Unique identifier for automation records
          - name: city
            description: City name
          - name: run_id
            description: Automation run identifier (includes version)
          - name: source_url
            description: Original source URL
          - name: file_name
            description: Source file name
          - name: loaded_at
            description: Timestamp when data was loaded

      - name: raw_automation_reviewed
        description: Review decisions for automation results
        columns:
          - name: automation_id
            description: Links to raw_automation
          - name: is_included
            description: Whether URL should be included (TRUE/FALSE as string)
          - name: file_name
            description: Source file name
          - name: loaded_at
            description: Timestamp when data was loaded

      - name: raw_city_language
        description: Language mapping for each city
        columns:
          - name: city
            description: City name
          - name: search_language
            description: Primary search language for the city
          - name: file_name
            description: Source file name
          - name: loaded_at
            description: Timestamp when data was loaded
      - name: bronze_blob_inventory_raw
        description: Raw LIST output snapshot for Azure Bronze blob paths.
        columns:
          - name: file_path
            description: Full blob path from stage LIST output
            tests:
              - not_null
          - name: size_bytes
            description: Blob size in bytes
          - name: md5
            description: Blob MD5 hash
          - name: last_modified
            description: Blob last modified timestamp

      - name: raw_sharecity200_tracker_run01
        description: |
          Run-01 ShareCity tracker content from ShareCity200Tracker.xlsx.
          One row per city with planning and QA metadata.
        columns:
          - name: region
            description: World region
          - name: country
            description: Country name
          - name: city
            description: City name
          - name: language
            description: Primary language
          - name: sharecity_tier
            description: ShareCity scope (e.g., SC100/SC200)
          - name: hub_or_spoke
            description: Hub/spoke designation
          - name: priority
            description: Priority level
          - name: dcu_fsi_search_plan_week_commencing
            description: DCU search plan week commencing date
          - name: tcd_manual_check_plan_week_commencing
            description: TCD manual check week commencing date
          - name: data_entry_size_before_manual_checking
            description: Entry count before manual checking
          - name: manual_review_checker_assigned
            description: Assigned reviewer
          - name: fsis_searched
            description: Search completion status
          - name: data_reviewed
            description: Review completion status
          - name: data_uploaded
            description: Upload completion status
          - name: automation_tool_version
            description: Tool version used
          - name: comments
            description: Free-text comments
          - name: valid_fsi
            description: Count of valid FSIs
          - name: accuracy_rate
            description: Accuracy percentage text
          - name: correct_name
            description: Count of correctly named rows
          - name: name_accuracy_rate
            description: Name accuracy percentage text
          - name: file_name
            description: Source filename used for ingestion
          - name: loaded_at
            description: Row ingestion timestamp

      - name: raw_bronze_fsi
        description: |
          Automation-discovered FSIs from all runs (run-01 to run-04).
          Loaded from CSV files at data/bronze/run-XX-csv/.
        columns:
          - name: city
            description: City name
            tests:
              - not_null
          - name: country
            description: Country name
            tests:
              - not_null
          - name: name
            description: FSI name
          - name: url
            description: FSI website URL
          - name: facebook_url
            description: Facebook URL
          - name: twitter_url
            description: Twitter URL
          - name: instagram_url
            description: Instagram URL
          - name: food_sharing_activities
            description: Food sharing activities
          - name: how_it_is_shared
            description: How it is shared
          - name: date_checked
            description: Date checked (raw string)
          - name: comments
            description: Free-text comments
          - name: lat
            description: Latitude
          - name: lon
            description: Longitude
          - name: file_name
            description: Source file path from Azure stage
          - name: loaded_at
            description: Row ingestion timestamp

      - name: raw_silver_fsi
        description: |
          Manually verified FSIs from all runs (run-01 to run-04).
          Same 13-column schema as bronze. Silver is a subset of bronze
          (false positive rows removed by manual review).
        columns:
          - name: city
            description: City name
            tests:
              - not_null
          - name: country
            description: Country name
            tests:
              - not_null
          - name: name
            description: FSI name
          - name: url
            description: FSI website URL
          - name: file_name
            description: Source file path from Azure stage
          - name: loaded_at
            description: Row ingestion timestamp

      - name: gold_fsi_200226
        description: Final deduplicated FSI dataset (Gold layer snapshot, 2026-02-20)
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "(select count(*) from {{ source('cultivate', 'gold_fsi_200226') }}) = 3052"
              name: gold_fsi_200226_total_count_check
        columns:
          - name: name
            description: FSI name
            tests:
              - not_null
          - name: url
            description: FSI website URL
            tests:
              - not_null
          - name: facebook_url
            description: Facebook URL
          - name: twitter_url
            description: Twitter URL
          - name: instagram_url
            description: Instagram URL
          - name: food_sharing_activities
            description: Array of food sharing activities (Distribution, Growing, Cooking & Eating)
          - name: how_it_is_shared
            description: Array of sharing modes (Gifting, Selling, Bartering, etc.)
          - name: country
            description: Country name
            tests:
              - not_null
          - name: city
            description: City name
            tests:
              - not_null
          - name: lon
            description: Longitude
          - name: lat
            description: Latitude

      - name: silver_fsi_201225
        description: |
          Silver snapshot table before final deduplication (2025-12-20).
          date_checked stored as STRING; parse in silver layer (int_fsi_powerbi_export)
        columns:
          - name: id
            description: Unique FSI identifier
            tests:
              - unique
              - not_null
          - name: city
            description: City name
            tests:
              - not_null
          - name: country
            description: Country name
            tests:
              - not_null
          - name: date_checked
            description: Raw date string (DD/MM/YYYY or empty); parsed to DATE in silver layer

