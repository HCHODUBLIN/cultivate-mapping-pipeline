version: 2

sources:
  # ─────────────────────────────────────────────────────────────
  # Metadata — cross-dataset reference tables
  # ─────────────────────────────────────────────────────────────
  - name: metadata
    description: Cross-dataset metadata (city lookups, run trackers)
    tables:
      - name: city_list
        description: City → Country / Region / Priority lookup (SHARECITY 100 master list)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/metadata/city_list.csv"
      - name: sharecity200_tracker
        description: ShareCity 200 run tracker (planning + QA metadata per city)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/metadata/sharecity200_tracker.csv"

  # ─────────────────────────────────────────────────────────────
  # CULTIVATE 100 — production FSI mapping (100 cities)
  # 4 automation rounds + 4 manual verification rounds
  # ─────────────────────────────────────────────────────────────
  - name: cultivate100
    description: |
      CULTIVATE 100 production dataset (100 cities, ~3,000 FSIs).
      Each round is a separate snapshot — duplication is expected and
      handled in the intermediate layer.
    tables:
      # ── Automation tool outputs (raw discovery)
      - name: bronze_automation_run01
        description: Automation tool output, round 1 (one CSV per city)
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/automation/run-01/*.csv', union_by_name=true, filename=true)"
      - name: bronze_automation_run02
        description: Automation tool output, round 2
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/automation/run-02/*.csv', union_by_name=true, filename=true)"
      - name: bronze_automation_run03
        description: Automation tool output, round 3
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/automation/run-03/*.csv', union_by_name=true, filename=true)"
      - name: bronze_automation_run04
        description: Automation tool output, round 4
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/automation/run-04/*.csv', union_by_name=true, filename=true)"

      # ── Manual verification (human-reviewed FSIs)
      - name: bronze_verified_run01
        description: Human-verified FSIs, round 1 (one CSV per city)
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/manual_verified/run-01/*.csv', union_by_name=true, filename=true)"
      - name: bronze_verified_run02
        description: Human-verified FSIs, round 2
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/manual_verified/run-02/*.csv', union_by_name=true, filename=true)"
      - name: bronze_verified_run03
        description: Human-verified FSIs, round 3
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/manual_verified/run-03/*.csv', union_by_name=true, filename=true)"
      - name: bronze_verified_run04
        description: Human-verified FSIs, round 4
        meta:
          external_location: "read_csv_auto('s3://cultivate-mapping-data/raw/manual_verified/run-04/*.csv', union_by_name=true, filename=true)"

  # ─────────────────────────────────────────────────────────────
  # SHARECITY 100 — three datasets across different years
  # Pipeline: raw URLs → deadlink_check_results → scraped → classified
  # ─────────────────────────────────────────────────────────────
  - name: sharecity100
    description: |
      SHARECITY 100 priority-4 city data, organised by year of collection:
      - 2016: legacy manual mapping (oldweb)
      - 2024: automation tool + scraping + LLM classification
      - 2026 (future): re-run with updated automation tool
    tables:
      # ── 2016 — legacy manual mapping
      - name: manual_2016
        description: 2016 SHARECITY 100 manual mapping (original FSI data with food activities)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/sharecity100/2016/manual_mapping.csv"
      - name: deadlink_2016
        description: 2016 oldweb dead link check results (2581 alive)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/sharecity100/2016/deadlink.csv"

      # ── 2024 — automation pipeline
      - name: deadlink_2024
        description: 2024 automation dead link check results (5093 alive)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/sharecity100/2024/deadlink.csv"
      - name: scraped_2024
        description: 2024 BeautifulSoup-extracted text from alive URLs
        meta:
          external_location: "s3://cultivate-mapping-data/raw/sharecity100/2024/scraped.csv"
      - name: classified_2024
        description: 2024 gpt-5-nano FSI classification (using pre-scraped text)
        meta:
          external_location: "s3://cultivate-mapping-data/raw/sharecity100/2024/classified.csv"

      # ── 2026 (future) — placeholder for re-run
      # - name: deadlink_2026
